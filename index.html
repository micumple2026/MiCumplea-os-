<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Etiquetas para vista previa en WhatsApp -->
    <meta property="og:title" content="¡Mi 5to Cumpleaños! 👑✨">
    <meta property="og:description" content="¡Estás invitado a celebrar mis 5 años! 🎈🎊">
    <meta property="og:image" content="https://i.ibb.co/yFnGHXkC/1.jpg">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://micumple2026.github.io/MiCumplea-os/">
    
    <title>¡Mi 5to Cumpleaños! 👑✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: url('https://cochinaditaselhit.com/wp-content/uploads/2015/01/fondo-nuevo4.gif') no-repeat center center fixed; 
            background-size: cover;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; 
            overflow-x: hidden; position: relative;
        }

        .confetti-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://i.pinimg.com/originals/da/c3/8f/dac38faf997774aa22a78ec3b6283444.gif');
            background-size: 200px; 
            background-repeat: no-repeat; 
            background-position: center; 
            z-index: 999; 
            pointer-events: none; 
            opacity: 0.6;
        }

        .start-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255, 255, 255, 0.95);
            z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            cursor: pointer; transition: opacity 1s ease;
        }
        .start-overlay img { width: 250px; margin-bottom: 20px; }
        .start-overlay p { font-family: 'Fredoka One', cursive; font-size: 1.5rem; color: #8e71eb; }
        .start-overlay.fly-away { opacity: 0; pointer-events: none; }

        .card-container { 
            background: white; max-width: 400px; width: 100%; border-radius: 40px; 
            padding: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 20; position: relative;
            opacity: 0; transition: opacity 1s ease;
        }
        .card-container.show { opacity: 1; }

        .subtitle { color: #ff85a2; font-weight: 800; font-size: 1.1rem; margin-bottom: 5px; }
        .age { font-family: 'Fredoka One', cursive; font-size: 4rem; color: #8e71eb; margin-bottom: 20px; }
        .profile-img { width: 220px; height: 220px; border-radius: 50%; object-fit: cover; margin-bottom: 20px; }

        .countdown-line { 
            display: flex; justify-content: center; align-items: baseline; gap: 15px; margin-bottom: 25px;
            background: #fff0f5; padding: 30px 20px; border-radius: 30px; border: 3px dashed #ff85a2;
        }
        .time-dias { font-size: 2.2rem; font-weight: 800; color: #ff6b6b; }
        .time-horas { font-size: 1.8rem; font-weight: 700; color: #feca57; }
        .time-min { font-size: 1.6rem; font-weight: 600; color: #7bed9f; }
        .time-seg { font-size: 1.4rem; font-weight: 600; color: #70a1ff; }

        .info-box { 
            background: #fcfcfc; border: 1px solid #eee; border-radius: 30px; 
            padding: 20px; margin-bottom: 20px; font-weight: 600; color: #333; line-height: 1.6;
        }

        .btn-whatsapp { 
            display: block; background: #2ecc71; color: white; padding: 18px; 
            border-radius: 50px; text-decoration: none; font-weight: 800; font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="confetti-overlay"></div>

    <!-- Etiqueta de audio -->
    <audio id="birthdayMusic" loop>
        <source src="música.mp3" type="audio/mpeg">
    </audio>

    <div class="start-overlay" id="startScreen">
        <img src="https://cdn.pixabay.com/animation/2023/11/07/14/26/14-26-02-708_512.gif" alt="Animación">
        <p>¡Toca para ver la invitación! ✨</p>
    </div>

    <div class="card-container" id="invitationCard">
        <p class="subtitle">¡ESTÁS INVITADO A CELEBRAR MIS! 🎈🎊</p>
        <h1 class="age">5 AÑOS 🦄✨</h1>
        <img src="1.jpg" alt="Foto" class="profile-img">

        <div class="countdown-line">
            <div class="time-dias"><span id="days">00</span>d</div>
            <div class="time-horas"><span id="hours">00</span>h</div>
            <div class="time-min"><span id="minutes">00</span>m</div>
            <div class="time-seg"><span id="seconds">00</span>s</div>
        </div>

        <div class="info-box">
            <p>¡Fiesta Mágica! 🥳🧁🍭</p>
            <p>📅 Sábado, 13 de septiembre - 4:00 PM</p>
            <p>📍 Camino Real #605 - Salas 🏡✨</p>
        </div>

        <a id="waLink" href="#" class="btn-whatsapp" onclick="actualizarMensaje()">¡Confirmar asistencia! 💬🎈</a>
    </div>

    <script>
        // Lógica de inicio y música
        document.getElementById('startScreen').addEventListener('click', function() {
            this.classList.add('fly-away');
            document.getElementById('invitationCard').classList.add('show');
            
            // Reproducir música al hacer clic
            var audio = document.getElementById('birthdayMusic');
            audio.play().catch(function(error) {
                console.log("La reproducción automática requiere interacción del usuario.");
            });
        });

        function actualizarMensaje() {
            const d = document.getElementById('days').innerText;
            const h = document.getElementById('hours').innerText;
            const m = document.getElementById('minutes').innerText;
            const s = document.getElementById('seconds').innerText;
            
            const texto = "Hola! Si asistire a tu cumpleanos. Estoy muy emocionado, ya estoy contando los dias: faltan " + d + " dias, " + h + " horas, " + m + " minutos y " + s + " segundos. Espero con ansias el gran dia para celebrar juntos.";
            const msg = encodeURIComponent(texto);
            document.getElementById('waLink').href = `https://wa.me/51923118345?text=${msg}`;
        }

        function updateCountdown() {
            const now = new Date().getTime();
            const target = new Date(`September 13, ${new Date().getFullYear()} 16:00:00`).getTime();
            let diff = target - now;
            if (diff < 0) diff = 0;

            document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('minutes').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById('seconds').innerText = Math.floor((diff % (1000 * 60)) / 1000);
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
